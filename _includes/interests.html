<h2 {% if site.style == 'dark' %}class="text-white"{% endif %}>Skills</h2>

<style>
  .category-divider {
    height: 1px;
    flex: 0 1 3rem;
  }
  {% if site.style == 'dark' %}
    .category-divider-left {
      background: linear-gradient(to right, transparent, rgba(88, 166, 255, 0.3));
    }
    .category-divider-right {
      background: linear-gradient(to left, transparent, rgba(88, 166, 255, 0.3));
    }
  {% else %}
    .category-divider-left {
      background: linear-gradient(to right, transparent, rgba(9, 105, 218, 0.3));
    }
    .category-divider-right {
      background: linear-gradient(to left, transparent, rgba(9, 105, 218, 0.3));
    }
  {% endif %}
</style>

{% for category in site.topics %}
  <div class="mb-6">
    <h3 class="d-flex flex-items-center flex-justify-center text-uppercase text-small text-bold {% if site.style == 'dark' %}text-blue{% else %}text-blue{% endif %} mb-4" style="letter-spacing: 0.1em;">
      <span class="category-divider category-divider-left mr-3"></span>
      <span>{{ category.category }}</span>
      <span class="category-divider category-divider-right ml-3"></span>
    </h3>
    <div class="d-flex flex-wrap gutter-condensed">
      {% for topic in category.items %}
        <div class="col-6 col-sm-4 col-md-3 col-lg-2 mb-3">
          {% include topic-card.html %}
        </div>
      {% endfor %}
    </div>
  </div>
{% endfor %}
